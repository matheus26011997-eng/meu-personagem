<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Meu Personagem</title>
  <style>
    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .ficha {
      background: #16213e;
      border: 2px solid #4f8eff;
      border-radius: 12px;
      padding: 2rem;
      color: white;
      text-align: center;
      width: 300px;
    }

    .avatar {
      font-size: 5rem;
      margin-bottom: 1rem;
    }

    h1 { color: #4f8eff; margin: 0 0 0.5rem; }

    .nivel {
      background: #4f8eff;
      border-radius: 20px;
      padding: 0.3rem 1rem;
      display: inline-block;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }

    .habilidades { text-align: left; margin-top: 1rem; }
    .habilidade {
      background: #0f3460;
      border-radius: 6px;
      padding: 0.5rem 1rem;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="ficha">
    <div class="avatar">🧙</div>
    <h1>Matheus</h1>
    <div class="nivel">⭐ Nível 1</div>
    <div class="habilidades">
      <div class="habilidade">🔥 Bola de Fogo</div>
      <div class="habilidade">⚡ Raio</div>
      <div class="habilidade">🛡️ Escudo Mágico</div>
    </div>
  </div>
</body>
</html>
